name: Downstream Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "*"
  workflow_dispatch:

env:
  DOWNSTREAM_PY_VERSION: '3.13'

jobs:
  downstream-pgstac:
    name: Test stac-fastapi-pgstac
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      pgstac:
        image: ghcr.io/stac-utils/pgstac:v0.8.5
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: username
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgis
          PGUSER: username
          PGPASSWORD: password
          PGDATABASE: postgis
        options: >-
          --health-cmd "pg_isready -U username -d postgis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out stac-fastapi
        uses: actions/checkout@v4

      - name: Check out stac-fastapi-pgstac
        uses: actions/checkout@v4
        with:
          repository: stac-utils/stac-fastapi-pgstac
          path: stac-fastapi-pgstac

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.*"
          enable-cache: true
          python-version: ${{ env.DOWNSTREAM_PY_VERSION }}

      - name: Create and activate virtual environment
        run: |
          uv venv
          echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Install stac-fastapi-pgstac dependencies
        run: |
          uv pip install -r ./stac-fastapi-pgstac/pyproject.toml \
                         -e ./stac-fastapi-pgstac \
                         --all-extras \
                         --group dev

      - name: Force-install local stac-fastapi subpackages
        run: |
          uv pip install --no-deps \
            -e ./stac_fastapi/types \
            -e ./stac_fastapi/api \
            -e ./stac_fastapi/extensions

      - name: Verify local link
        run: |
          python -c "import stac_fastapi.types; print('Using types from:', stac_fastapi.types.__file__)"

      - name: Run PgSTAC downstream tests
        run: |
          cd stac-fastapi-pgstac
          pytest -svvv
        env:
          PGUSER: username
          PGPASSWORD: password
          PGDATABASE: postgis
          PGHOST: localhost
          PGPORT: 5432


  downstream-opensearch:
    name: Test stac-fastapi-elasticsearch-opensearch
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      opensearch:
        image: opensearchproject/opensearch:2.11.0
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          "plugins.security.disabled": "true"
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        options: >-
          --health-cmd "sh -c 'curl -f http://localhost:9200/_cluster/health || exit 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out stac-fastapi
        uses: actions/checkout@v4

      - name: Check out stac-fastapi-elasticsearch-opensearch
        uses: actions/checkout@v4
        with:
          repository: stac-utils/stac-fastapi-elasticsearch-opensearch
          path: stac-fastapi-elasticsearch-opensearch

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.*"
          enable-cache: true
          python-version: ${{ env.DOWNSTREAM_PY_VERSION }}

      - name: Create and activate virtual environment
        run: |
          uv venv
          echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Install stac-fastapi-opensearch dependencies
        run: |
          uv pip install -e "./stac-fastapi-elasticsearch-opensearch/stac_fastapi/core" \
                         -e "./stac-fastapi-elasticsearch-opensearch/stac_fastapi/opensearch[dev,test]" \
                         -e "./stac-fastapi-elasticsearch-opensearch/stac_fastapi/elasticsearch[dev,test]" \
                         pytest pytest-asyncio

      - name: Force-install local stac-fastapi subpackages
        run: |
          uv pip install --no-deps \
            -e ./stac_fastapi/types \
            -e ./stac_fastapi/api \
            -e ./stac_fastapi/extensions

      - name: Verify local link
        run: |
          python -c "import stac_fastapi.types; print('Using types from:', stac_fastapi.types.__file__)"

      - name: Run OpenSearch downstream tests
        run: |
          cd stac-fastapi-elasticsearch-opensearch
          pytest -svvv
        env:
          OPENSEARCH_HOST: localhost
          OPENSEARCH_PORT: 9200
          OPENSEARCH_SCHEME: http
          OPENSEARCH_USE_SSL: "false"
          OPENSEARCH_VERIFY_CERTS: "false"
          ES_HOST: localhost
          ES_PORT: 9200
          ES_SCHEME: http
          ES_USE_SSL: "false"
          ES_VERIFY_CERTS: "false"