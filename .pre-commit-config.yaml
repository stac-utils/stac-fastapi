repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.8"
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
    - id: mypy
      language_version: python
      exclude: tests/.*
      additional_dependencies:
      - types-attrs
      - pydantic
